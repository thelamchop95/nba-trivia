<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Trivia Showdown</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="court-bg" aria-hidden="true">
  <div class="hoop-glow"></div>
  <svg class="court-lines" viewBox="0 0 1000 600" preserveAspectRatio="none">
    <circle cx="500" cy="300" r="90" fill="none" stroke="white" stroke-width="2"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="300" r="180" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="1000" cy="300" r="180" fill="none" stroke="white" stroke-width="2"/>
    <rect x="0" y="220" width="190" height="160" fill="none" stroke="white" stroke-width="2"/>
    <rect x="810" y="220" width="190" height="160" fill="none" stroke="white" stroke-width="2"/>
  </svg>
  <div class="jersey-numbers" aria-hidden="true">
    <span style="top:8%; left:4%;">23</span>
    <span style="top:65%; left:10%;">6</span>
    <span style="top:15%; left:80%;">33</span>
    <span style="top:75%; left:85%;">0</span>
    <span style="top:40%; left:46%;">34</span>
    <span style="top:5%; left:45%;">32</span>
    <span style="top:85%; left:50%;">13</span>
    <span style="top:50%; left:5%;">30</span>
    <span style="top:30%; left:92%;">11</span>
  </div>
  <div class="player-silhouette silhouette-dunk" aria-hidden="true"></div>
  <div class="player-silhouette silhouette-pass" aria-hidden="true"></div>
  <div class="player-silhouette silhouette-jumpshot" aria-hidden="true"></div>
</div>

<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <span class="basketball-icon" aria-hidden="true"></span>
      <h1>NBA Trivia Showdown</h1>
    </div>
    <div class="topbar-controls">
      <div class="highscore-badge" id="highscore-badge">
        <span class="hs-label">High score</span>
        <span class="hs-value" id="highscore-value">0 / 10</span>
      </div>
      <button id="dark-toggle" class="icon-toggle" aria-label="Toggle night mode" title="Toggle night mode">🌙</button>
    </div>
  </header>

  <main class="game-card" id="game-card">
    <div id="app"></div>
  </main>

  <footer class="footer">
    <p>Pure HTML / CSS / JS &mdash; host me on GitHub Pages.</p>
  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
